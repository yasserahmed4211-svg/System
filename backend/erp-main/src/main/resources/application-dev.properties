# ========================================
# ERP System - Development Profile
# ========================================
# Overrides for local development only
# Activate with: --spring.profiles.active=dev
# ========================================

# ========================================
# JPA - Development Settings
# ========================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Hibernate 7 (Jakarta EE 3) - creates only what doesn't exist
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none

# ========================================
# Security - Development Settings
# ========================================
# Dev-only JWT secret hardcoded - no env var needed locally. NEVER copied to prod.
erp.security.jwt.secret=dev-only-secret-minimum-256-bits-long-do-not-use-in-prod
# Extended token lifetime for development convenience
erp.security.jwt.access-expiration-seconds=86400

# ========================================
# Logging - Extra verbose for Development (overrides base)
# ========================================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# Swagger - Full Features in Dev
# ========================================
springdoc.swagger-ui.try-it-out-enabled=true
