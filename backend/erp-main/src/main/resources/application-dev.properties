# ========================================
# ERP System - Development Profile
# ========================================
# Overrides for local development only
# Activate with: --spring.profiles.active=dev
# ========================================

# ========================================
# JPA - Development Settings
# ========================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
# Hibernate 7 (Jakarta EE 3) - creates tables, skips if already exist
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=create

# ========================================
# Security - Development Settings
# ========================================
# Extended token lifetime for development convenience
erp.security.jwt.access-expiration-seconds=86400

# ========================================
# Logging - Extra verbose for Development (overrides base)
# ========================================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# Swagger - Full Features in Dev
# ========================================
springdoc.swagger-ui.try-it-out-enabled=true
