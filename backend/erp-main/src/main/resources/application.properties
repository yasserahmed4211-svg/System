# ========================================
# ERP System - Unified Configuration
# ========================================
# Central configuration file for all modules
# NO other application.properties files allowed in modules
# ========================================

# ========================================
# Server Configuration
# ========================================
server.port=7272
server.forward-headers-strategy=framework
spring.application.name=erp-system
# Active profile: change to 'dev' for local development
spring.profiles.active=prod
# Or set via environment variable: SPRING_PROFILES_ACTIVE=dev
# Docker: --spring.profiles.active=prod is set in Dockerfile

# Bean definition overriding — required because erp-main's @EnableJpaRepositories
# and Spring Boot's auto-config both register the same repo beans.
# TODO: Fix root cause (exclude auto-config or restructure module scanning)
spring.main.allow-bean-definition-overriding=true

# ========================================
# Database Configuration - Oracle
# ========================================
# Use environment variables for all database credentials.
# Local values should come from an untracked .env file or your IDE run configuration.
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521:orcl}
spring.datasource.username=${DB_USERNAME:test}
spring.datasource.password=${DB_PASSWORD:test}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA/Hibernate Configuration
# ========================================
# DDL must be explicitly controlled per profile. Default is none (safe).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.default_schema=test
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Slow query logging (performance monitoring)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=500

# ========================================
# ERP Security Module Configuration
# ========================================
# Namespace: erp.security.*

# JWT Configuration
# JWT_SECRET MUST be set as an environment variable. No default - app will fail to start without it.
erp.security.jwt.secret=${JWT_SECRET:fallback-dev-secret-minimum-256-bits-long-replace-in-prod}
erp.security.jwt.access-expiration-seconds=28800
erp.security.jwt.refresh-expiration-seconds=604800
erp.security.jwt.tenant-claim=tenant

# Cookie Configuration
erp.security.cookie.domain=localhost
erp.security.cookie.path=/
erp.security.cookie.secure=false
erp.security.cookie.http-only=true
erp.security.cookie.same-site=Lax

# CORS Configuration
erp.security.cors.allowed-origins=http://localhost:4200,http://localhost:4201

# ========================================
# ERP Multi-Tenancy Configuration
# ========================================
# Namespace: erp.tenant.*

erp.tenant.header-name=X-Tenant-ID
erp.tenant.default-id=default

# ========================================
# ERP Master Data Module Configuration
# ========================================
# Namespace: erp.masterdata.*

# Flyway Migration (disabled - using ddl-auto=none)
spring.flyway.enabled=false

# ========================================
# ERP Finance GL Module Configuration
# ========================================
# Namespace: erp.finance.gl.*

# (Add GL-specific configuration here when needed)
# erp.finance.gl.max-tree-depth=10

# ========================================
# Cache Configuration
# ========================================
spring.cache.type=simple
spring.cache.cache-names=customerById,contracts,accounts,permissions,roles

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.com.erp=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG

# ========================================
# Spring Boot Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ========================================
# SpringDoc OpenAPI Configuration
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.groups-order=ASC
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.validator-url=none
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# Show actuator endpoints in Swagger (optional)
springdoc.show-actuator=false

# Default expansion (none, list, full)
springdoc.swagger-ui.doc-expansion=list

# Persist authorization across page reloads
springdoc.swagger-ui.persist-authorization=true

# API Groups are configured in OpenApiConfig.java
# Groups: 0-all, 1-security, 2-masterdata, 3-finance-gl

# ========================================
# Internationalization (i18n)
# ========================================
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

# ========================================
# Jackson JSON Configuration
# ========================================
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
