# ========================================
# ERP System - Test Profile Configuration
# ========================================
# For unit and integration tests
# Uses H2 in-memory database
# ========================================

# ========================================
# H2 In-Memory Database for Tests
# ========================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========================================
# JPA/Hibernate - Test Settings
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# Flyway - Disabled for Tests
# ========================================
spring.flyway.enabled=false

# ========================================
# Cache - Disabled for Tests
# ========================================
spring.cache.type=none

# ========================================
# Security - Test Configuration
# ========================================
erp.security.jwt.secret=test-secret-key-for-jwt-tokens-minimum-256-bits-long
erp.security.jwt.access-expiration-seconds=3600
erp.security.jwt.refresh-expiration-seconds=86400
erp.security.jwt.tenant-claim=tenant

erp.security.cookie.domain=localhost
erp.security.cookie.path=/
erp.security.cookie.secure=false
erp.security.cookie.http-only=true
erp.security.cookie.same-site=Lax

erp.security.cors.allowed-origins=http://localhost:4200

# ========================================
# Tenant - Test Configuration
# ========================================
erp.tenant.header-name=X-Tenant-ID
erp.tenant.default-id=test-tenant

# ========================================
# Logging - Test Settings
# ========================================
logging.level.com.example=DEBUG
logging.level.org.springframework.test=DEBUG
logging.level.org.hibernate.SQL=DEBUG
