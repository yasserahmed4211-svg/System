<div class="erp-readonly-hint">
  @if (labelKey) {
    <div class="erp-readonly-hint__label">{{ labelKey | translate }}</div>
  }

  @if (hasValue) {
    <div class="erp-readonly-hint__value">
      {{ value }}
    </div>
  } @else {
    <div class="erp-readonly-hint__placeholder">{{ placeholderKey | translate }}</div>
  }
</div>
