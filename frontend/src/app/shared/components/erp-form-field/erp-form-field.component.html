<div class="erp-form-field">
  @if (labelKey) {
    <label class="erp-form-field__label">
      <span>{{ labelKey | translate }}</span>
      @if (required) {
        <span class="erp-form-field__required">*</span>
      }
    </label>
  }

  <div class="erp-form-field__control">
    <ng-content></ng-content>
  </div>

  @if (hintKey) {
    <small class="erp-form-field__hint">{{ hintKey | translate }}</small>
  }

  @if (showError) {
    <div class="erp-form-field__error">
      <small>{{ error?.key | translate: error?.params }}</small>
    </div>
  }
</div>
