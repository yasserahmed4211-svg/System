<div class="erp-spec-filter">
  <div class="d-flex align-items-center justify-content-between mb-2">
    <div class="fw-semibold">{{ 'FILTER.ADVANCED_FILTERS' | translate }}</div>
    <div class="d-flex gap-2">
      <button type="button" class="btn btn-sm btn-outline-primary" (click)="addRow()">
        <i class="ti ti-plus"></i>
        {{ 'COMMON.ADD' | translate }}
      </button>
      <button type="button" class="btn btn-sm btn-outline-secondary" (click)="clearAll()">
        <i class="ti ti-x"></i>
        {{ 'COMMON.CLEAR' | translate }}
      </button>
      <button type="button" class="btn btn-sm btn-primary" (click)="onApply()">
        <i class="ti ti-check"></i>
        {{ 'FILTER.APPLY' | translate }}
      </button>
    </div>
  </div>

  @for (row of rows; track row.id) {
  <div class="row g-2 align-items-end mb-2">
    <div class="col-md-4">
      <label class="form-label small mb-1">{{ 'FILTER.FIELD' | translate }}</label>
      <select class="form-select form-select-sm" [(ngModel)]="row.field" (ngModelChange)="onFieldChanged(row)">
        <option value="" disabled>{{ 'COMMON.SELECT' | translate }}</option>
        @for (f of availableFields; track f.value) {
          <option [value]="f.value">{{ f.label | translate }}</option>
        }
      </select>
    </div>

    <div class="col-md-3">
      <label class="form-label small mb-1">{{ 'FILTER.OPERATOR' | translate }}</label>
      <select class="form-select form-select-sm" [(ngModel)]="row.operator">
        @for (op of getOperatorsForField(row.field); track op.value) {
          <option [ngValue]="op.value">{{ op.label | translate }}</option>
        }
      </select>
    </div>

    <div class="col-md-4">
      <label class="form-label small mb-1">{{ 'FILTER.VALUE' | translate }}</label>
      @if (needsValue(row.operator)) {
        @let opts = getFieldOptions(row.field);
        @if (opts) {
          <select class="form-select form-select-sm" [(ngModel)]="row.value">
            @for (opt of opts; track opt.value) {
              <option [ngValue]="opt.value">{{ opt.label | translate }}</option>
            }
          </select>
        } @else {
          <input type="text" class="form-control form-control-sm" [(ngModel)]="row.value" [placeholder]="'FILTER.ENTER_VALUE' | translate" />
        }
      } @else {
        <input type="text" class="form-control form-control-sm" value="-" disabled />
      }
    </div>

    <div class="col-md-1">
      <button
        type="button"
        class="btn btn-sm btn-outline-danger w-100"
        (click)="removeRow(row.id)"
        [disabled]="rows.length === 1"
        [title]="'COMMON.REMOVE' | translate"
        [attr.aria-label]="'COMMON.REMOVE' | translate"
      >
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  }

  <div class="form-text mt-2">
    {{ 'FILTER.NOTES_IN_VALUES' | translate }}
  </div>
</div>
